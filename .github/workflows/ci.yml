name: CI

on:
  push:
  pull_request:

jobs:
  acceptance:
    name: acceptance (${{ matrix.os }} / py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
        experimental: [false]
        include:
          # Python 3.14 is the dev environment; allowed to fail while wheels settle.
          - os: windows-latest
            python: "3.14"
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install core CLI (no optional extras)
        run: pip install ./cli
      - name: Entry-point smoke
        # Catches packaging / console-script breakage (both binaries import and
        # their parsers build) that the acceptance suite alone would not.
        run: |
          wiki --help
          wiki-librarian --help
      - name: Run acceptance suite
        # Pure Python, offline, temp DB. Also enforces: no API keys / no machine
        # paths in tracked files (the project's key-free guarantee).
        run: python tests/acceptance.py

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        # Scoped conservatively via cli/pyproject.toml [tool.ruff]: real-bug
        # rules only (pyflakes + syntax errors), no broad style rules.
        run: ruff check cli/
